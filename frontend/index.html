<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>AI Assistant</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="app">

        <!-- SIDEBAR -->
        <aside class="sidebar">

            <div class="logo">
                <img src="./img/avt-face.jpg" class="avatar-img">
                <div id="username-display"></div>
            </div>

            <button class="new-chat" onclick="newChat()">+ New Chat</button>
            <button class="new-licsu" onclick="loadHistory()">📜 Lịch sử</button>
            <button onclick="logout()">🚪 Đăng xuất</button>

        </aside>

        <!-- MAIN -->
        <main class="main">

            <div class="chat-box">

                <div class="chat-header">
                    <h2>Chat AI</h2>
                </div>

                <div id="chat" class="chat"></div>

                <!-- MODE -->
                <div class="mode-select">
                    <button id="btn-ai" class="active" onclick="setMode('ai')">🤖 AI</button>
                    <button id="btn-data" onclick="setMode('data')">📚 Data</button>
                </div>

                <!-- INPUT -->
                <div class="input-box">
                    <input id="input" placeholder="Nhập tin nhắn..." autocomplete="off" />
                    <button onclick="sendMessage()">➤</button>
                </div>

            </div>

        </main>

    </div>

    <script src="js/app.js"></script>

</body>

</html>
