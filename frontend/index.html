<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#08080f" />
    <title>Nova — AI Chat</title>
    <script>
      (function () {
        document.documentElement.setAttribute(
          "data-theme",
          localStorage.getItem("theme") || "dark"
        );
      })();
    </script>
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <div class="grain" aria-hidden="true"></div>

    <header class="topbar">
      <div class="topbar-left">
        <div class="brand">
          <span class="brand-mark">N</span>
          <span class="brand-name">Nova</span>
        </div>
        <nav class="mode-tabs" aria-label="Chế độ chat">
          <button id="btn-ai" class="mode-tab active" onclick="setMode('ai')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M12 2a4 4 0 0 1 4 4v1h1a3 3 0 0 1 0 6h-1v1a4 4 0 0 1-8 0v-1H7a3 3 0 0 1 0-6h1V6a4 4 0 0 1 4-4z"/></svg>
            AI Chat
          </button>
          <button id="btn-data" class="mode-tab" onclick="setMode('data')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14a9 3 0 0 0 18 0V5"/><path d="M3 12a9 3 0 0 0 18 0"/></svg>
            Knowledge
          </button>
        </nav>
      </div>

      <div class="topbar-right">
        <span class="mode-badge" id="mode-badge">AI</span>
        <button class="icon-btn" onclick="newChat()" title="Cuộc trò chuyện mới" aria-label="Cuộc trò chuyện mới">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
        </button>
        <button class="icon-btn" onclick="loadHistory()" title="Lịch sử" aria-label="Lịch sử">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        </button>
        <button class="icon-btn" onclick="toggleTheme()" title="Đổi giao diện" aria-label="Đổi giao diện">
          <span data-theme-icon>
            <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          </span>
        </button>
        <div class="user-chip">
          <div class="user-avatar" id="user-avatar">U</div>
          <span id="username-display"></span>
        </div>
        <button class="icon-btn logout-btn" onclick="logout()" title="Đăng xuất" aria-label="Đăng xuất">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </header>

    <main class="chat-stage">
      <div id="chat" class="chat" role="log" aria-live="polite" aria-label="Cuộc trò chuyện">
        <div id="empty-state" class="empty-state">
          <div class="empty-visual">
            <div class="orb orb-1"></div>
            <div class="orb orb-2"></div>
            <div class="empty-card">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            </div>
          </div>
          <h2>Xin chào!</h2>
          <p>Hỏi bất cứ điều gì — AI sẽ trả lời ngay, hoặc chuyển sang Knowledge để tra cứu dữ liệu.</p>
          <div class="suggestions">
            <button class="suggestion" onclick="useSuggestion('Xin chào, bạn có thể giúp gì?')">Xin chào 👋</button>
            <button class="suggestion" onclick="useSuggestion('Giá sản phẩm bao nhiêu?')">Hỏi giá 💰</button>
            <button class="suggestion" onclick="useSuggestion('Chính sách giao hàng thế nào?')">Giao hàng 📦</button>
          </div>
        </div>
      </div>
    </main>

    <footer class="composer">
      <div class="composer-inner">
        <textarea
          id="input"
          rows="1"
          placeholder="Nhập tin nhắn của bạn..."
          autocomplete="off"
          aria-label="Tin nhắn"
        ></textarea>
        <button class="send-btn" onclick="sendMessage()" title="Gửi" aria-label="Gửi tin nhắn">
          <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
      <p class="composer-hint">Enter để gửi · Shift+Enter xuống dòng · Nova AI có thể mắc lỗi</p>
    </footer>

    <script src="js/theme.js"></script>
    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
