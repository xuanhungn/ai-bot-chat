<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#08080f">
    <title>Đăng ký — Nova</title>
    <script>
      (function () {
        document.documentElement.setAttribute(
          "data-theme",
          localStorage.getItem("theme") || "dark"
        );
      })();
    </script>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="grain" aria-hidden="true"></div>

    <div class="auth-layout">
        <aside class="auth-hero">
            <div class="hero-content">
                <div class="brand">
                    <span class="brand-mark">N</span>
                    <span class="brand-name">Nova</span>
                </div>
                <h1>Bắt đầu hành trình<br>cùng AI.</h1>
                <p>Tạo tài khoản miễn phí và khám phá sức mạnh của trợ lý thông minh.</p>
            </div>
            <div class="hero-orbs" aria-hidden="true">
                <div class="orb orb-1"></div>
                <div class="orb orb-2"></div>
                <div class="orb orb-3"></div>
            </div>
        </aside>

        <main class="auth-panel">
            <button class="theme-toggle" onclick="toggleTheme()" title="Đổi giao diện" aria-label="Đổi giao diện">
                <span data-theme-icon>
                    <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                    <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                </span>
            </button>

            <div class="auth-form-wrap">
                <h2>Đăng ký</h2>
                <p class="auth-sub">Tạo tài khoản mới</p>

                <div class="form-group">
                    <label for="username">Tên đăng nhập</label>
                    <input id="username" placeholder="username" autocomplete="username">
                </div>

                <div class="form-group">
                    <label for="password">Mật khẩu</label>
                    <input id="password" type="password" placeholder="Tối thiểu 4 ký tự" autocomplete="new-password">
                </div>

                <p id="error-msg" class="error-msg" role="alert"></p>

                <button class="btn-primary" onclick="register()">Tạo tài khoản</button>

                <p class="auth-footer">
                    Đã có tài khoản? <a href="login.html">Đăng nhập</a>
                </p>
            </div>
        </main>
    </div>

    <script src="js/theme.js"></script>
    <script src="js/config.js"></script>
    <script src="js/register.js"></script>
</body>
</html>
