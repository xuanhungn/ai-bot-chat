services:
  - type: web
    name: ai-bot-chat-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --chdir backend api:app --bind 0.0.0.0:$PORT --timeout 120 --workers 1
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE_DAYS
        value: "7"
      - key: KB_MIN_RATIO
        value: "1.0"
